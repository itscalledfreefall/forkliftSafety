# SafetyVision Production Configuration (Raspberry Pi 5 + Hailo-8L)
# ────────────────────────────────────────────────────────────────

input:
  # One entry per camera. Detection runs on the sub stream; the main stream
  # is optional and only used by the web UI live preview.
  cameras:
    - id: back
      rtsp_url: "rtsp://admin:matrix18@192.168.1.108:554/cam/realmonitor?channel=1&subtype=1"
      rtsp_url_main: "rtsp://admin:matrix18@192.168.1.108:554/cam/realmonitor?channel=1&subtype=0"
      mode: zone
      zone:
        yellow_start_y: 0.29
        red_start_y: 0.78
      distance:
        warning_distance_m: 2.0
        danger_distance_m: 1.0
        calibration_path: "config/calibration/back.yaml"
  width: 640
  height: 480
  target_fps: 15

model:
  runtime: hailo
  path_hef: "/usr/share/hailo-models/yolov6n_h8l.hef"
  conf_threshold: 0.50
  iou_threshold: 0.50
  person_class_id: 0

alert:
  siren_wav: "assets/audio/danger.wav"
  voice_wav: "assets/audio/medium.wav"
  yellow_start_y: 0.29
  red_start_y: 0.78
  min_alert_confidence: 0.55
  always_announce_person: false
  repeat_interval_sec: 3.0
  min_clear_sec: 3.0

perf:
  max_queue_size: 1
  capture_cpu_cores: [0]
  inference_cpu_cores: [1, 2, 3]
  temporal_smoothing_frames: 3
  shm_snapshot_dir: "/dev/shm/safetyvision"
  shm_snapshot_interval_sec: 1.0

logging:
  level: INFO
  json_output: true
  log_dir: "./logs"
  max_size_mb: 50

health:
  heartbeat_interval_sec: 1.0
  camera_reconnect_max_backoff_sec: 30.0
