# SafetyVision Configuration
# ──────────────────────────

input:
  mode: usb                        # rtsp | usb
  rtsp_url: "rtsp://192.168.1.100:554/stream"
  usb_device: "/dev/video0"
  width: 640
  height: 480
  fps: 30

model:
  path_onnx: "models/yolo26n.onnx"                         # ONNX model path
  path_openvino: "models/yolo26n_openvino_model/yolo26n.xml"  # OpenVINO IR XML path
  path_pt: "models/yolo26n.pt"                             # Ultralytics PT model path
  runtime: onnxruntime                                     # onnxruntime | openvino | ultralytics
  input_size: 512
  conf_threshold: 0.50
  iou_threshold: 0.50
  person_class_id: 0

alert:
  siren_wav: "assets/audio/danger.wav"       # played in red zone
  voice_wav: "assets/audio/medium.wav"       # played in yellow zone
  # Horizontal band zone cut lines (normalized Y, 0=top, 1=bottom):
  #   0.00 .. 0.33  = green  (top)    → no sound
  #   0.33 .. 0.66  = yellow (middle) → medium sound
  #   0.66 .. 1.00  = red   (bottom) → danger sound
  yellow_start_y: 0.33
  red_start_y: 0.66
  min_alert_confidence: 0.55
  always_announce_person: false
  repeat_interval_sec: 1.5
  min_clear_sec: 3.0

perf:
  max_queue_size: 1
  capture_cpu_cores: [0]
  inference_cpu_cores: [1, 2, 3]
  inference_threads: 4
  temporal_smoothing_frames: 5

logging:
  level: INFO
  json_output: true
  log_dir: "./logs"
  max_size_mb: 50

health:
  heartbeat_interval_sec: 1.0
  camera_reconnect_max_backoff_sec: 30.0
