# SafetyVision Configuration
# ──────────────────────────

input:
  mode: usb                        # rtsp | usb
  rtsp_url: "rtsp://192.168.1.100:554/stream"
  usb_device: "/dev/video0"
  width: 640
  height: 480
  fps: 30

model:
  path_onnx: "models/yolo26n.onnx"                         # ONNX model path
  path_openvino: "models/yolo26n_openvino_model/yolo26n.xml"  # OpenVINO IR XML path
  path_pt: "models/yolo26n.pt"                             # Ultralytics PT model path
  runtime: onnxruntime                                     # onnxruntime | openvino | ultralytics
  input_size: 512
  conf_threshold: 0.50
  iou_threshold: 0.50
  person_class_id: 0

alert:
  siren_wav: "assets/audio/danger.wav"
  voice_wav: "assets/audio/medium.wav"
  use_zone_polygons: true
  danger_zone_polygon:             # normalized [x, y], bottom-center near forklift
    - [0.35, 0.58]
    - [0.65, 0.58]
    - [0.90, 1.00]
    - [0.10, 1.00]
  medium_zone_polygon:             # wider zone ahead
    - [0.20, 0.40]
    - [0.80, 0.40]
    - [1.00, 1.00]
    - [0.00, 1.00]
  close_area_ratio: 0.18
  medium_area_ratio: 0.06
  min_alert_confidence: 0.55
  zone_hysteresis_ratio: 0.03
  distance_smoothing_alpha: 0.30
  always_announce_person: false
  repeat_interval_sec: 3.0
  min_clear_sec: 3.0

perf:
  max_queue_size: 1
  capture_cpu_cores: [0]
  inference_cpu_cores: [1, 2, 3]
  inference_threads: 4
  temporal_smoothing_frames: 5

logging:
  level: INFO
  json_output: true
  log_dir: "./logs"
  max_size_mb: 50

health:
  heartbeat_interval_sec: 1.0
  camera_reconnect_max_backoff_sec: 30.0
