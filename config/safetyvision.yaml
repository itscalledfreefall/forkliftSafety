# SafetyVision Configuration
# ──────────────────────────

input:
  mode: usb                        # rtsp | usb
  rtsp_url: "rtsp://192.168.1.100:554/stream"
  usb_device: "/dev/video0"
  width: 640
  height: 480
  fps: 30

model:
  path_onnx: "models/yolo26n.onnx"                         # ONNX model path
  path_openvino: "models/yolo26n_openvino_model/yolo26n.xml"  # OpenVINO IR XML path
  path_pt: "models/yolo26n.pt"                             # Ultralytics PT model path
  runtime: onnxruntime                                     # onnxruntime | openvino | ultralytics
  input_size: 640
  conf_threshold: 0.45
  iou_threshold: 0.50
  person_class_id: 0

alert:
  siren_wav: "assets/audio/danger.wav"
  voice_wav: "assets/audio/medium.wav"
  close_area_ratio: 0.20            # bbox area ratio (danger if >= this)
  medium_area_ratio: 0.08           # bbox area ratio (medium if >= this and < close)
  zone_hysteresis_ratio: 0.02       # stabilize zone switching near thresholds
  distance_smoothing_alpha: 0.4     # EMA smoothing for bbox area ratio
  always_announce_person: true      # if person is detected, at least medium is announced
  repeat_interval_sec: 0.75
  min_clear_sec: 3.0

perf:
  max_queue_size: 1
  capture_cpu_cores: [0]
  inference_cpu_cores: [1, 2, 3]
  inference_threads: 4
  temporal_smoothing_frames: 3

logging:
  level: INFO
  json_output: true
  log_dir: "./logs"
  max_size_mb: 50

health:
  heartbeat_interval_sec: 1.0
  camera_reconnect_max_backoff_sec: 30.0
