# SafetyVision Raspberry Pi 5 + Hailo-8L profile
# ───────────────────────────────────────────────

input:
  cameras:
    - id: back
      rtsp_url: "rtsp://admin:matrix18@192.168.1.64:554/Streaming/Channels/102"
      rtsp_url_main: "rtsp://admin:matrix18@192.168.1.64:554/Streaming/Channels/101"
      mode: zone
      zone:
        yellow_start_y: 0.33
        red_start_y: 0.72
      distance:
        warning_distance_m: 2.0
        danger_distance_m: 1.0
        calibration_path: "config/calibration/back.yaml"
  width: 640
  height: 480
  target_fps: 15

model:
  runtime: hailo
  path_hef: "/usr/share/hailo-models/yolov6n_h8l.hef"
  conf_threshold: 0.50
  iou_threshold: 0.50
  person_class_id: 0

alert:
  siren_wav: "assets/audio/danger.wav"
  voice_wav: "assets/audio/medium.wav"
  # Zone classification: "bands" (Y-thresholds) or "distance" (homography meters).
  # Toggle via the calibration UI; do not edit by hand once distance mode is in use.
  zone_mode: bands
  yellow_start_y: 0.33
  red_start_y: 0.72
  # Distance-mode parameters (only used when zone_mode == "distance").
  calibration_path: "config/calibration_back.json"
  danger_threshold_m: 1.0
  warning_threshold_m: 5.0
  distance_smoothing_frames: 3
  min_alert_confidence: 0.55
  always_announce_person: false
  repeat_interval_sec: 1.2
  min_clear_sec: 2.5

perf:
  max_queue_size: 1
  capture_cpu_cores: [0]
  inference_cpu_cores: [1, 2, 3]
  temporal_smoothing_frames: 3
  shm_snapshot_dir: "/dev/shm/safetyvision"
  shm_snapshot_interval_sec: 1.0

logging:
  level: INFO
  json_output: true
  log_dir: "./logs"
  max_size_mb: 50

health:
  heartbeat_interval_sec: 1.0
  camera_reconnect_max_backoff_sec: 30.0

# Optional FLIR thermal camera overlay (full-frame scene-max heat check).
# Streaming-only: scene-max temperature is read from the FLIR REST API
# (GET /api/image/adjustment "high", Kelvin). Leave the camera image set to
# Auto level/span so "high" tracks the scene. Set the password via the web UI.
thermal:
  enabled: false
  host: "192.168.1.115"
  username: "admin"
  password: ""  # set via the Thermal Config tab (not stored in source)
  rtsp_url: ""  # set via the Thermal Config tab, e.g. rtsp://<user>:<pass>@<host>:554/avc
  max_temp_c: 40.0
  poll_interval_sec: 1.0
  repeat_interval_sec: 10.0
  snapshot_dir: "thermal_violations"
  max_snapshots: 200
