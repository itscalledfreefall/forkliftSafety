<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniGuard - Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 100 100" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="3" fill="none"/>
        <circle cx="50" cy="50" r="12" fill="currentColor"/>
        <path d="M 50 20 C 58 20 62 26 58 32 C 54 38 46 38 50 30 C 52 26 50 20 50 20 Z" fill="currentColor"/>
        <path d="M 24 65 C 20 58 22 51 28 49 C 34 47 38 54 32 58 C 28 60 24 65 24 65 Z" fill="currentColor"/>
        <path d="M 76 65 C 80 58 78 51 72 49 C 66 47 62 54 68 58 C 72 60 76 65 76 65 Z" fill="currentColor"/>
      </svg>
      <h1>OmniGuard</h1>
    </div>
    <p class="subtitle">Forklift Safety System</p>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" autocomplete="username" required>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Log In</button>
      <div id="loginError" class="error" style="display:none"></div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          err.textContent = data.detail || 'Login failed';
          err.style.display = 'block';
        }
      } catch(e) {
        err.textContent = 'Connection error';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
