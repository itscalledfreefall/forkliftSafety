<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafetyVision — Log In</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/vendor/lucide.min.js"></script>
</head>
<body class="login-body">
  <div class="login-card">

    <div class="login-header">
      <div class="logo-row">
        <div class="pulse-dot"></div>
        <div class="logo">
          <div class="logo-icon-lg">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
              <path d="M8 2L13.5 5V11L8 14L2.5 11V5L8 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
              <circle cx="8" cy="8" r="2" fill="white"/>
            </svg>
          </div>
          <span class="logo-wordmark">Safety<span>Vision</span></span>
        </div>
      </div>
      <div class="card-subtitle">Forklift Safety System</div>
    </div>

    <form id="loginForm" class="login-form">
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon-left">
            <i data-lucide="user" style="width:15px;height:15px;"></i>
          </span>
          <input
            id="username"
            class="input-field"
            type="text"
            placeholder="Enter username"
            autocomplete="username"
            spellcheck="false"
            required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon-left">
            <i data-lucide="lock" style="width:15px;height:15px;"></i>
          </span>
          <input
            id="password"
            class="input-field has-right-icon"
            type="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required>
          <button type="button" class="input-icon-right" id="eyeToggle" aria-label="Show or hide password">
            <i data-lucide="eye" style="width:15px;height:15px;" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i data-lucide="log-in" style="width:15px;height:15px;"></i>
        Log In
      </button>

      <div id="loginError" class="error" style="display:none"></div>
    </form>

    <div class="card-footer">
      <span class="build-info">v0.1.0 · build 2026-05-02</span>
    </div>

  </div>

  <script>
    // Login submit (handler unchanged from prior version)
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          err.textContent = data.detail || 'Login failed';
          err.style.display = 'block';
        }
      } catch(e) {
        err.textContent = 'Connection error';
        err.style.display = 'block';
      }
    });

    // Eye toggle
    (function(){
      const toggle = document.getElementById('eyeToggle');
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      let visible = false;
      toggle.addEventListener('click', () => {
        visible = !visible;
        pwd.type = visible ? 'text' : 'password';
        icon.setAttribute('data-lucide', visible ? 'eye-off' : 'eye');
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons();
        }
      });
    })();

    // Render initial lucide icons
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
